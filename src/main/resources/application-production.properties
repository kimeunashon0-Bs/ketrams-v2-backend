# =========================================
# Production Profile (Render)
# =========================================
# Added fallback values (:localhost, :5432, :postgres, etc.) to prevent
# literal placeholders from being passed to the driver.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# TEMPORARY: Use 'update' to create tables on first run.
# After tables exist, change back to 'validate' to prevent accidental schema changes.
spring.jpa.hibernate.ddl-auto=update