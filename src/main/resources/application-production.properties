# =========================================
# Production Profile (Render)
# =========================================
# Fallback values ensure placeholders never reach the driver.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Validate schema ? tables are already created.
spring.jpa.hibernate.ddl-auto=validate

# Optional: add timeouts for email to avoid hanging
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Enable debug logging for your controllers (remove after debugging)
# logging.level.com.ketrams.v2=DEBUG
# logging.level.org.springframework.web=DEBUG