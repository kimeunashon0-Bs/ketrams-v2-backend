# =========================================
# Production Profile (Render)
# =========================================
# Database ? fallbacks prevent literal placeholders from reaching the driver
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Validate schema ? tables are already created
spring.jpa.hibernate.ddl-auto=validate

# Email timeouts (optional)
spring.mail.properties.mail.smtp.connectiontimeout=50000
spring.mail.properties.mail.smtp.timeout=50000
spring.mail.properties.mail.smtp.writetimeout=50000

# Enable request logging to debug 403 on /health
logging.level.org.springframework.web=DEBUG
logging.level.com.ketrams.v2=DEBUG