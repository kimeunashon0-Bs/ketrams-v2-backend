# =========================================
# Common Configuration (applies to all profiles)
# =========================================
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Hibernate 6+ auto-detects the dialect ? you can remove the line below.
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads
jwt.secret=${JWT_SECRET:mySecretKeyWithAtLeast32CharactersLongEnoughForHS512!!!}
jwt.expiration=86400000

# Email configuration ? credentials must be set in environment variables
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:kimeunashon@gmail.com}         # Set EMAIL_USERNAME in Render
spring.mail.password=${EMAIL_PASSWORD}          # Set EMAIL_PASSWORD in Render
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional: mail debugging (enable temporarily to see errors in logs)
logging.level.org.springframework.mail=DEBUG
logging.level.com.ketrams.v2=DEBUG

# SMS provider (Twilio / mock)
sms.provider=${SMS_PROVIDER:mock}
sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# =========================================
# Default Profile (local)
# =========================================
# For local development, set DATABASE_URL, PGUSER, PGPASSWORD in your environment.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver