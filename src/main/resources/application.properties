# =========================================
# Server Configuration
# =========================================
server.port=${PORT:8080}

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# File Upload
# =========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# =========================================
# JWT Configuration
# =========================================
jwt.secret=${JWT_SECRET:mySecretKeyWithAtLeast32CharactersLongEnoughForHS512!!!}
jwt.expiration=86400000

# =========================================
# Email Configuration (Optional)
# =========================================
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:kimeunashon@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:tkfxknqqsnwmqbkf}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================
# SMS Configuration (Twilio)
# =========================================
sms.provider=${SMS_PROVIDER:mock}
sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# =========================================
# Database Configuration (PostgreSQL for Railway)
# =========================================
# Production profile ? uses DATABASE_URL from Railway
spring.datasource.url=jdbc:${DATABASE_URL}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

